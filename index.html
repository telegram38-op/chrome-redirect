<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <script>
        window.onload = function() {
            // 1. URL se "link" parameter nikalna
            const urlParams = new URLSearchParams(window.location.search);
            const targetBase64 = urlParams.get('url');

            // 2. Agar URL parameter nahi hai, toh default link par bhejo
            let finalUrl = "https://get2short.com/aKlx"; 

            if (targetBase64) {
                try {
                    // Base64 decode karke asli link nikalna (Security ke liye)
                    finalUrl = atob(targetBase64);
                } catch (e) {
                    console.error("Invalid Link Format");
                }
            }

            // 3. Chrome Intent trigger karna (Android ke liye)
            var chromeIntent = "intent://" + finalUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            
            window.location.replace(chromeIntent);

            // 4. Fallback (iPhone/PC ke liye)
            setTimeout(function() {
                window.location.href = finalUrl;
            }, 1500);
        };
    </script>
</head>
<body>
    <p style="text-align:center; margin-top:50px;">Redirecting to Chrome...</p>
</body>
</html>
