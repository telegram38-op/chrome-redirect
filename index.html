<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Opening in Chrome...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-manual {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
    <script>
        function openInChrome() {
            var targetUrl = "https://get2short.com/aKlx";
            
            // Android Chrome Intent - Ye direct Chrome app trigger karega
            var chromeIntent = "intent://" + targetUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            
            // Pehle automatic koshish karein
            window.location.replace(chromeIntent);

            // Agar 2 second mein redirect nahi hota (e.g. iPhone ya Desktop), toh normal redirect karein
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 2000);
        }
        window.onload = openInChrome;
    </script>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2>Opening Securely in Chrome...</h2>
        <p>Agar page load nahi hota, toh niche click karein:</p>
        <a href="https://get2short.com/aKlx" class="btn-manual">Open Manually</a>
    </div>
</body>
</html>
